<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reset password — Nudge</title>
<meta name="theme-color" content="#F5F1FF">
<style>
  :root{
    --bg: #F5F1FF;
    --accent: #A78BFA;
    --ink: #111111;
    --font-serif: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a{ color: inherit; text-decoration: none; }

  a:focus-visible,
  button:focus-visible,
  input:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }

  .page{
    max-width: 640px;
    margin: 0 auto;
    padding: 0 1.5rem;
    width: 100%;
  }

  /* ---------- Nav ---------- */
  nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 1.75rem 0 0;
  }

  .logo{
    font-family: var(--font-serif);
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .logo .dark{ color: var(--ink); }
  .logo .accent{ color: var(--accent); }

  .nav-link{
    font-family: var(--font-sans);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
    opacity: 0.65;
    transition: opacity 0.18s ease;
  }
  .nav-link:hover{ opacity: 1; }

  /* ---------- Centered card area ---------- */
  main{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(2.5rem, 8vw, 4rem) 0;
  }

  .auth-card{
    width: 100%;
    max-width: 380px;
    background: #ffffff;
    border-radius: 18px;
    padding: clamp(2rem, 6vw, 2.5rem) clamp(1.75rem, 6vw, 2.25rem) 2rem;
    box-shadow: 0 30px 60px -25px rgba(17,17,17,0.12);
  }

  .auth-head{
    text-align: center;
    margin-bottom: 1.75rem;
  }

  .auth-head h1{
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 1.55rem;
    margin: 0 0 0.4rem;
    letter-spacing: -0.01em;
  }

  .auth-head p{
    font-size: 0.85rem;
    color: var(--ink);
    opacity: 0.65;
    margin: 0;
  }

  /* ---------- Form ---------- */
  form{ display:flex; flex-direction:column; }

  .field{
    margin-bottom: 1.1rem;
  }

  .field label{
    display:block;
    font-size: 0.86rem;
    font-weight: 600;
    color: var(--ink);
    opacity: 0.65;
    margin-bottom: 0.5rem;
  }

  .field input{
    width: 100%;
    font-family: var(--font-sans);
    font-size: 0.95rem;
    color: #000000;
    background: #ffffff;
    border: 1.5px solid rgba(17,17,17,0.12);
    border-radius: 10px;
    padding: 0.75rem 0.9rem;
    outline: none;
    transition: border-color 0.18s ease;
  }

  .field input::placeholder{
    color: var(--ink);
    opacity: 0.45;
  }

  .field input:focus{
    border-color: var(--accent);
  }

  .btn-primary{
    width: 100%;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 0.95rem;
    padding: 0.85rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.18s ease, transform 0.1s ease;
    margin-top: 0.25rem;
  }
  .btn-primary:hover{ background: #2b2b2b; }
  .btn-primary:active{ transform: scale(0.98); }

  .switch-line{
    text-align: center;
    margin-top: 1.6rem;
    font-size: 0.85rem;
    color: var(--ink);
    opacity: 0.65;
  }

  .switch-line a{
    font-weight: 700;
    opacity: 1;
    color: var(--accent);
  }
  .switch-line a:hover{ text-decoration: underline; }

  footer{
    text-align:center;
    padding: 0 0 2rem;
    font-size: 0.78rem;
    opacity: 0.45;
  }

  /* ---------- Confirmation state (in-card, no confetti — this isn't a celebration) ---------- */
  .confirm-state{
    display: none;
    text-align: center;
  }
  .confirm-state.show{ display: block; }

  .confirm-icon{
    width: 48px;
    height: 48px;
    margin: 0 auto 1.1rem;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .confirm-icon svg{
    width: 22px;
    height: 22px;
    color: var(--accent);
  }

  .confirm-state h2{
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 1.4rem;
    margin: 0 0 0.6rem;
    letter-spacing: -0.01em;
  }

  .confirm-state p{
    font-size: 0.88rem;
    color: var(--ink);
    opacity: 0.65;
    margin: 0 0 1.5rem;
    line-height: 1.6;
  }

  .confirm-state .destination{
    color: var(--ink);
    opacity: 1;
    font-weight: 600;
  }

  .resend-line{
    font-size: 0.82rem;
    color: var(--ink);
    opacity: 0.65;
    margin-top: 2.5rem;
  }

  .resend-line button{
    background: none;
    border: none;
    padding: 0;
    font-family: var(--font-sans);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent);
    cursor: pointer;
    opacity: 1;
    transition: opacity 0.18s ease, transform 0.1s ease;
  }
  .resend-line button:hover{ text-decoration: underline; }
  .resend-line button:active{ transform: scale(0.96); }
</style>
</head>
<body>

<div class="page">
  <nav>
    <a class="logo" href="/"><span class="dark">Nudg</span><span class="accent">e</span></a>
    <a class="nav-link" href="/signin" id="navBackLink">← Back to sign in</a>
  </nav>
</div>

<main>
  <div class="auth-card">

    <!-- Request state -->
    <div id="requestState">
      <div class="auth-head">
        <h1>Reset your password</h1>
        <p>We'll send a code to verify it's you.</p>
      </div>

      <form onsubmit="return false;">
        <div class="field">
          <label for="identifier">Email or phone number</label>
          <input type="text" id="identifier" name="identifier" placeholder="you@email.com or +91 98765 43210" autocomplete="username" required>
        </div>

        <button type="submit" class="btn-primary" onclick="showOtp(event)">Send code</button>
      </form>
    </div>

    <!-- OTP entry state -->
    <div id="otpState" class="confirm-state">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <path d="M22 6l-10 7L2 6"></path>
        </svg>
      </div>
      <h2>Enter your code</h2>
      <p>We've sent a 6-digit code to your email and WhatsApp for <span class="destination" id="destinationText">your account</span>.</p>

      <form onsubmit="return false;">
        <div class="field" style="text-align:left;">
          <label for="otpCode">Verification code</label>
          <input type="text" id="otpCode" name="otpCode" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" autocomplete="one-time-code" required style="text-align:center; letter-spacing: 0.4em; font-size: 1.1rem;">
        </div>

        <button type="submit" class="btn-primary" onclick="verifyOtp(event)" style="margin-bottom: 0.5rem;">Verify code</button>
      </form>

      <p class="resend-line">Didn't get it? <button type="button" onclick="resend()">Resend code</button></p>
    </div>

  </div>
</main>

<footer>
  Nudge by Addicoot · Built solo · © 2026
</footer>

<script>
  // Visual only — no real OTP sending or verification wired yet.
  function showOtp(e){
    e.preventDefault();
    var form = document.querySelector('#requestState form');

    if (!form.checkValidity()){
      form.reportValidity();
      return;
    }

    var identifier = document.getElementById('identifier').value.trim();
    document.getElementById('destinationText').textContent = identifier || 'your account';

    document.getElementById('requestState').style.display = 'none';
    var otpState = document.getElementById('otpState');
    otpState.classList.add('show');
    otpState.setAttribute('tabindex', '-1');
    otpState.focus();

    var navLink = document.getElementById('navBackLink');
    navLink.textContent = '← Start over';
    navLink.href = '#';
    navLink.onclick = startOver;
  }

  function startOver(e){
    if (e) e.preventDefault();
    document.getElementById('otpState').classList.remove('show');
    document.getElementById('requestState').style.display = 'block';
    document.getElementById('otpCode').value = '';

    var navLink = document.getElementById('navBackLink');
    navLink.textContent = '← Back to sign in';
    navLink.href = '/signin';
    navLink.onclick = null;
  }

  function verifyOtp(e){
    e.preventDefault();
    var form = document.querySelector('#otpState form');

    if (!form.checkValidity()){
      form.reportValidity();
      return;
    }

    // Placeholder — real OTP verification happens against the backend once wired.
    window.location.href = '/reset-password';
  }

  function resend(){
    // Placeholder — will trigger the real resend call once wired to backend.
    var line = document.querySelector('.resend-line');
    line.textContent = 'Code resent.';
    line.style.opacity = '0.65';
  }
</script>

</body>
</html>
