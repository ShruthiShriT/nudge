<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nudge — Small nudges. Real progress.</title>
<meta name="description" content="Nudge sends you one AI-written message a day, on WhatsApp, to keep you moving on the goal you actually care about.">
<meta name="theme-color" content="#F5F1FF">
<style>
  :root{
    --bg: #F5F1FF;
    --accent: #A78BFA;
    --ink: #111111;
    --font-serif: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  a{ color: inherit; text-decoration: none; }

  .page{
    max-width: 640px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  a:focus-visible,
  button:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }

  /* ---------- Nav ---------- */
  nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 1.75rem 0 0;
  }

  .logo{
    font-family: var(--font-serif);
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .logo .dark{ color: var(--ink); }
  .logo .accent{ color: var(--accent); }

  /* Secondary tier: supporting nav link */
  .signin{
    font-family: var(--font-sans);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
    opacity: 0.65;
    transition: opacity 0.18s ease;
  }
  .signin:hover{ opacity: 1; }

  /* ---------- Hero ---------- */
  .hero{
    text-align:center;
    padding: clamp(3.5rem, 9vw, 6rem) 0 clamp(2rem, 5vw, 3rem);
  }

  .hero h1{
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: clamp(1.9rem, 5.4vw, 2.6rem);
    line-height: 1.25;
    margin: 0 0 0.9rem;
    letter-spacing: -0.01em;
  }

  /* Secondary tier: supporting tagline */
  .hero .tagline{
    font-family: var(--font-sans);
    font-size: clamp(0.95rem, 2.4vw, 1.05rem);
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--ink);
    opacity: 0.65;
    margin: 0;
  }

  /* ---------- Phone / aha moment ---------- */
  .phone-section{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: clamp(1rem, 4vw, 2rem) 0 clamp(4.5rem, 9vw, 6.25rem);
  }

  .phone{
    width: clamp(252px, 72vw, 300px);
    aspect-ratio: 9 / 18.5;
    background: var(--ink);
    border-radius: 2.6rem;
    padding: 0.55rem;
    box-shadow: 0 30px 60px -25px rgba(17,17,17,0.35);
  }

  .phone-notch{
    position:absolute;
    top: 0.85rem;
    left:50%;
    transform: translateX(-50%);
    width: 70px;
    height: 18px;
    background: var(--ink);
    border-radius: 12px;
    z-index: 2;
  }

  .screen{
    position:relative;
    width:100%;
    height:100%;
    background: var(--bg);
    border-radius: 2.1rem;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  /* Tertiary tier: low-priority chrome (status bar clock) */
  .status-bar{
    display:flex;
    justify-content:flex-end;
    padding: 0.7rem 1rem 0.2rem;
    font-size: 0.7rem;
    font-weight: 600;
    opacity: 0.45;
  }

  .chat-header{
    display:flex;
    align-items:center;
    gap: 0.6rem;
    padding: 0.5rem 1rem 0.75rem;
  }

  .avatar{
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 0.95rem;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }

  .chat-names{ line-height:1.2; }
  .chat-name{ font-size: 0.85rem; font-weight: 600; }
  /* Tertiary tier: low-priority chrome ("online" status) */
  .chat-status{ font-size: 0.68rem; opacity: 0.45; }

  /* Structural hairline — not part of text tier system */
  .chat-divider{
    height:1px;
    background: var(--ink);
    opacity: 0.08;
    margin: 0 1rem;
  }

  .messages{
    flex:1;
    padding: 1rem;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
  }

  .bubble-wrap{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap: 0.3rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .bubble-wrap.show{ opacity:1; transform: translateY(0); }

  .bubble{
    background: var(--accent);
    color: var(--bg);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 0.6rem 0.85rem;
    font-size: 0.82rem;
    max-width: 88%;
    min-height: 1.4em;
  }

  .typing-dots{
    display:none;
    align-items:center;
    gap: 4px;
    height: 0.6rem;
  }
  .typing-dots.show{ display:flex; }
  .typing-dots span{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--bg);
    opacity: 0.85;
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){ animation-delay: 0.15s; }
  .typing-dots span:nth-child(3){ animation-delay: 0.3s; }

  @keyframes bounce{
    0%, 60%, 100%{ transform: translateY(0); opacity:0.6; }
    30%{ transform: translateY(-4px); opacity:1; }
  }

  .msg-text{ white-space: pre-wrap; word-break: break-word; }

  /* Tertiary tier: timestamp + ticks row, once revealed */
  .meta{
    display:flex;
    align-items:center;
    gap: 0.3rem;
    font-size: 0.66rem;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    padding-left: 0.2rem;
  }
  .meta.show{ opacity: 0.45; transform: translateY(0); }

  /* Read-receipt ticks: secondary while unread, primary + accent once read (color signals state, not opacity) */
  .ticks{
    color: var(--ink);
    opacity: 0.65;
    transition: color 0.4s ease, opacity 0.4s ease;
  }
  .ticks.read{ color: var(--accent); opacity: 1; }

  /* ---------- CTA ---------- */
  .cta{
    margin-top: clamp(1.5rem, 4vw, 2rem);
    display:inline-block;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 0.95rem;
    padding: 0.85rem 2.1rem;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease, background 0.18s ease;
    pointer-events: none;
  }
  .cta.show{
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .cta:hover{ background: #2b2b2b; }
  .cta:active{ transform: translateY(0) scale(0.98); }

  /* ---------- Closing ---------- */
  .closing{
    text-align:center;
    padding: 0 0 clamp(5rem, 10vw, 7.5rem);
  }

  /* Primary tier: standalone statement, full ink weight */
  .closing-line{
    font-family: var(--font-serif);
    font-size: clamp(1.15rem, 3.2vw, 1.45rem);
    font-weight: 400;
    line-height: 1.55;
    color: var(--ink);
    opacity: 1;
    margin: 0;
  }

  /* ---------- Footer ---------- */
  /* Tertiary tier: lowest-priority page text */
  footer{
    border-top: 1px solid rgba(17,17,17,0.08);
    padding: 1.5rem 0 2.5rem;
    text-align:center;
    font-size: 0.78rem;
    opacity: 0.45;
  }

  @media (prefers-reduced-motion: reduce){
    .bubble-wrap, .meta, .cta, .ticks{ transition: none !important; }
    .typing-dots span{ animation: none !important; }
  }
</style>
</head>
<body>

<div class="page">

  <nav>
    <span class="logo"><span class="dark">Nudg</span><span class="accent">e</span></span>
    <a class="signin" href="/signin">Sign in</a>
  </nav>

  <header class="hero">
    <h1>You don't need more motivation.<br>You need a nudge.</h1>
    <p class="tagline">Small nudges. Real progress.</p>
  </header>

  <main>
    <section class="phone-section" aria-label="Example of a Nudge message on WhatsApp">
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="screen">
          <div class="status-bar">8:00 AM</div>

          <div class="chat-header">
            <div class="avatar">N</div>
            <div class="chat-names">
              <div class="chat-name">Nudge</div>
              <div class="chat-status">online</div>
            </div>
          </div>
          <div class="chat-divider"></div>

          <div class="messages">
            <div class="bubble-wrap" id="bubble-wrap">
              <div class="bubble" id="bubble">
                <div class="typing-dots" id="typing">
                  <span></span><span></span><span></span>
                </div>
                <span class="msg-text" id="msg-text" data-full-text="Hey Maya — day 14 of &quot;Run a 5K.&quot; You said mornings are hardest. Lace up before coffee. Even 10 minutes counts today."></span>
              </div>
              <div class="meta" id="meta">
                <span>8:00 AM</span>
                <span class="ticks" id="ticks">✓✓</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <a class="cta" id="cta" href="/signup">Get started</a>
    </section>

    <section class="closing">
      <p class="closing-line">Consistency compounds.</p>
    </section>
  </main>

  <footer>
    Nudge by Addicoot · Built solo · © 2026
  </footer>

</div>

<noscript>
  <style>
    #typing{ display:none !important; }
    .msg-text::after{ content: attr(data-full-text); }
    #bubble-wrap, .meta, .cta{ opacity: 1 !important; transform: none !important; pointer-events: auto !important; }
    .ticks{ color: var(--accent) !important; opacity: 1 !important; }
  </style>
</noscript>

<script>
  (function(){
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var bubbleWrap = document.getElementById('bubble-wrap');
    var typing = document.getElementById('typing');
    var msgText = document.getElementById('msg-text');
    var meta = document.getElementById('meta');
    var ticks = document.getElementById('ticks');
    var cta = document.getElementById('cta');
    var fullText = msgText.getAttribute('data-full-text');

    function showFinalState(){
      typing.classList.remove('show');
      typing.style.display = 'none';
      msgText.textContent = fullText;
      bubbleWrap.classList.add('show');
      meta.classList.add('show');
      ticks.classList.add('read');
      cta.classList.add('show');
    }

    if (reduceMotion){
      showFinalState();
      return;
    }

    // 1. bubble appears, typing dots animate
    setTimeout(function(){
      bubbleWrap.classList.add('show');
      typing.classList.add('show');
    }, 500);

    // 2. typing dots give way to the message, which types itself out
    setTimeout(function(){
      typing.classList.remove('show');
      typing.style.display = 'none';
      var i = 0;
      var interval = setInterval(function(){
        i++;
        msgText.textContent = fullText.slice(0, i);
        if (i >= fullText.length){
          clearInterval(interval);

          // 3. timestamp + ticks settle in
          setTimeout(function(){
            meta.classList.add('show');

            // 4. ticks shift to "read"
            setTimeout(function(){
              ticks.classList.add('read');

              // 5. the single CTA arrives
              setTimeout(function(){
                cta.classList.add('show');
              }, 450);
            }, 500);
          }, 300);
        }
      }, 32);
    }, 1900);
  })();
</script>

</body>
</html>
