<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Set new password — Nudge</title>
<meta name="theme-color" content="#F5F1FF">
<style>
  :root{
    --bg: #F5F1FF;
    --accent: #A78BFA;
    --ink: #111111;
    --font-serif: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a{ color: inherit; text-decoration: none; }

  a:focus-visible,
  button:focus-visible,
  input:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }

  .page{
    max-width: 640px;
    margin: 0 auto;
    padding: 0 1.5rem;
    width: 100%;
  }

  nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 1.75rem 0 0;
  }

  .logo{
    font-family: var(--font-serif);
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .logo .dark{ color: var(--ink); }
  .logo .accent{ color: var(--accent); }

  .nav-link{
    font-family: var(--font-sans);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
    opacity: 0.65;
    transition: opacity 0.18s ease;
  }
  .nav-link:hover{ opacity: 1; }

  main{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(2.5rem, 8vw, 4rem) 0;
  }

  .auth-card{
    width: 100%;
    max-width: 380px;
    background: #ffffff;
    border-radius: 18px;
    padding: clamp(2rem, 6vw, 2.5rem) clamp(1.75rem, 6vw, 2.25rem) 2rem;
    box-shadow: 0 30px 60px -25px rgba(17,17,17,0.12);
  }

  .auth-head{
    text-align: center;
    margin-bottom: 1.75rem;
  }

  .auth-head h1{
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 1.55rem;
    margin: 0 0 0.4rem;
    letter-spacing: -0.01em;
  }

  .auth-head p{
    font-size: 0.85rem;
    color: var(--ink);
    opacity: 0.65;
    margin: 0;
  }

  form{ display:flex; flex-direction:column; }

  .field{ margin-bottom: 1.1rem; }

  .field label{
    display:block;
    font-size: 0.86rem;
    font-weight: 600;
    color: var(--ink);
    opacity: 0.65;
    margin-bottom: 0.5rem;
  }

  .field input{
    width: 100%;
    font-family: var(--font-sans);
    font-size: 0.95rem;
    color: #000000;
    background: #ffffff;
    border: 1.5px solid rgba(17,17,17,0.12);
    border-radius: 10px;
    padding: 0.75rem 0.9rem;
    outline: none;
    transition: border-color 0.18s ease;
  }

  .field input::placeholder{ color: var(--ink); opacity: 0.45; }
  .field input:focus{ border-color: var(--accent); }

  .password-wrap{ position: relative; }
  .password-wrap input{ padding-right: 2.6rem; }

  .toggle-visibility{
    position: absolute;
    right: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.65;
    transition: opacity 0.18s ease;
  }
  .toggle-visibility:hover{ opacity: 1; }
  .toggle-visibility svg{ width: 14px; height: 14px; display:block; }

  .field-hint{
    font-size: 0.76rem;
    color: var(--ink);
    opacity: 0.45;
    margin: -0.7rem 0 1.1rem;
  }

  .btn-primary{
    width: 100%;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 0.95rem;
    padding: 0.85rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.18s ease, transform 0.1s ease;
    margin-top: 0.25rem;
  }
  .btn-primary:hover{ background: #2b2b2b; }
  .btn-primary:active{ transform: scale(0.98); }
  .btn-primary:disabled{ opacity: 0.55; cursor: default; }

  footer{
    text-align:center;
    padding: 0 0 2rem;
    font-size: 0.78rem;
    opacity: 0.45;
  }

  .confirm-state{ display: none; text-align: center; }
  .confirm-state.show{ display: block; }

  .confirm-icon{
    width: 48px;
    height: 48px;
    margin: 0 auto 1.1rem;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .confirm-icon svg{ width: 22px; height: 22px; color: var(--accent); }

  .confirm-state h2{
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 1.4rem;
    margin: 0 0 0.6rem;
    letter-spacing: -0.01em;
  }

  .confirm-state p{
    font-size: 0.88rem;
    color: var(--ink);
    opacity: 0.65;
    margin: 0 0 1.5rem;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="page">
  <nav>
    <a class="logo" href="/"><span class="dark">Nudg</span><span class="accent">e</span></a>
    <a class="nav-link" href="/signin" id="navBackLink">← Back to sign in</a>
  </nav>
</div>

<main>
  <div class="auth-card">

    <!-- Reset form state -->
    <div id="resetState">
      <div class="auth-head">
        <h1>Set a new password</h1>
        <p>Choose something you haven't used before.</p>
      </div>

      <form onsubmit="return false;">
        <div class="field">
          <label for="newPassword">New password</label>
          <div class="password-wrap">
            <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" autocomplete="new-password" minlength="8" required>
            <button type="button" class="toggle-visibility" id="toggleVisibility1" aria-label="Show password" aria-pressed="false">
              <svg class="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <p class="field-hint">Must be at least 8 characters.</p>

        <div class="field">
          <label for="confirmPassword">Confirm new password</label>
          <div class="password-wrap">
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter new password" autocomplete="new-password" minlength="8" required>
            <button type="button" class="toggle-visibility" id="toggleVisibility2" aria-label="Show password" aria-pressed="false">
              <svg class="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" onclick="submitResetPassword(event)">Reset password</button>
      </form>
    </div>

    <!-- Confirmation state -->
    <div id="confirmState" class="confirm-state">
      <div class="confirm-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"></path>
        </svg>
      </div>
      <h2>Password updated</h2>
      <p>Your password has been reset successfully. You can now sign in with your new password.</p>
      <a class="btn-primary" href="/signin" style="display:block; text-decoration:none; text-align:center;">Back to sign in</a>
    </div>

  </div>
</main>

<footer>
  Nudge by Addicoot · Built solo · © 2026
</footer>

<script src="/api.js"></script>
<script>
  var resetEmail = sessionStorage.getItem('reset_email') || '';
  var resetOtp = sessionStorage.getItem('reset_otp') || '';

  if (!resetEmail || !resetOtp) {
    window.location.href = '/forgot-password';
  }

  async function submitResetPassword(e){
    e.preventDefault();
    var form = document.querySelector('#resetState form');
    if (!form.checkValidity()){ form.reportValidity(); return; }

    var newPw = document.getElementById('newPassword');
    var confirmPw = document.getElementById('confirmPassword');

    if (newPw.value !== confirmPw.value){
      confirmPw.setCustomValidity("Passwords don't match");
      confirmPw.reportValidity();
      confirmPw.addEventListener('input', function(){ confirmPw.setCustomValidity(''); }, { once: true });
      return;
    }

    var btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Updating…';

    try {
      await NudgeAPI.resetPassword({
        email: resetEmail,
        otp: resetOtp,
        new_password: newPw.value
      });
      sessionStorage.removeItem('reset_email');
      sessionStorage.removeItem('reset_otp');

      document.getElementById('resetState').style.display = 'none';
      document.getElementById('navBackLink').style.display = 'none';
      var confirmState = document.getElementById('confirmState');
      confirmState.classList.add('show');
      confirmState.setAttribute('tabindex', '-1');
      confirmState.focus();
    } catch(err) {
      alert(err.message || 'Could not reset password. The code may have expired — try again.');
      btn.disabled = false;
      btn.textContent = 'Reset password';
    }
  }

  function setupToggle(buttonId, inputEl){
    var btn = document.getElementById(buttonId);
    var eye = btn.querySelector('.eyeIcon');
    var eyeOpen = '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path><circle cx="12" cy="12" r="3"></circle>';
    var eyeClosed = '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.6 18.6 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a18.6 18.6 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
    btn.addEventListener('click', function(){
      var showing = inputEl.type === 'text';
      inputEl.type = showing ? 'password' : 'text';
      eye.innerHTML = showing ? eyeOpen : eyeClosed;
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
      btn.setAttribute('aria-pressed', showing ? 'false' : 'true');
    });
  }

  setupToggle('toggleVisibility1', document.getElementById('newPassword'));
  setupToggle('toggleVisibility2', document.getElementById('confirmPassword'));
</script>

</body>
</html>
