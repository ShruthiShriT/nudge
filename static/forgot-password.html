<script src="/api.js"></script>
<script>
  var currentEmail = '';

  async function showOtp(e){
    e.preventDefault();
    var form = document.querySelector('#requestState form');
    if (!form.checkValidity()){ form.reportValidity(); return; }

    var identifier = document.getElementById('identifier').value.trim();
    var btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      await NudgeAPI.forgotPassword(identifier);
      currentEmail = identifier;
      sessionStorage.setItem('reset_email', identifier);
      document.getElementById('destinationText').textContent = identifier;
      document.getElementById('requestState').style.display = 'none';
      var otpState = document.getElementById('otpState');
      otpState.classList.add('show');
      otpState.setAttribute('tabindex', '-1');
      otpState.focus();
      var navLink = document.getElementById('navBackLink');
      navLink.textContent = '← Start over';
      navLink.href = '#';
      navLink.onclick = startOver;
    } catch(err) {
      alert(err.message || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Send code';
    }
  }

  function startOver(e){
    if (e) e.preventDefault();
    document.getElementById('otpState').classList.remove('show');
    document.getElementById('requestState').style.display = 'block';
    document.getElementById('otpCode').value = '';
    var navLink = document.getElementById('navBackLink');
    navLink.textContent = '← Back to sign in';
    navLink.href = '/signin';
    navLink.onclick = null;
  }

  async function verifyOtp(e){
    e.preventDefault();
    var form = document.querySelector('#otpState form');
    if (!form.checkValidity()){ form.reportValidity(); return; }

    var otp = document.getElementById('otpCode').value.trim();
    var btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Verifying…';

    // Store OTP for reset-password page to use
    sessionStorage.setItem('reset_otp', otp);
    // Navigate — reset-password will do the actual password update
    window.location.href = '/reset-password';
  }

  async function resend(){
    var email = sessionStorage.getItem('reset_email');
    if (!email) return;
    try {
      await NudgeAPI.forgotPassword(email);
      var line = document.querySelector('.resend-line');
      line.textContent = 'Code resent.';
    } catch(err) {
      alert(err.message || 'Could not resend code.');
    }
  }
</script>
